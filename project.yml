name: Pauseo

options:
  bundleIdPrefix: app.pauseo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

schemes:
  Pauseo:
    build:
      targets:
        Pauseo: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

targets:
  Pauseo:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Pauseo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.pauseo
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        DEVELOPMENT_ASSET_PATHS: "\"Pauseo/Preview Content\""
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "0.1.0"
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
          SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
